# See: https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2

updates:
  # Check for outdated GitHub Actions used in workflows under /.github/workflows/.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily

  # Test-only dependencies in requirements-test.txt; validate.py itself is stdlib-only.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    allow:
      - dependency-type: all
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
